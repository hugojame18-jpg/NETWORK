name: cc-submit

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ccsubmit
      POSTGRES_PASSWORD: ccsubmit
      POSTGRES_DB: ccsubmit
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccsubmit -d ccsubmit"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ccsubmit:ccsubmit@db:5432/ccsubmit?schema=public
      REDIS_URL: redis://redis:6379
      # Containers default to UTC. "Today" for the daily stats is the operator's
      # calendar day, so pin the app's wall clock to the operator's timezone.
      # Override to match where the network is operated from.
      TZ: Europe/Paris
    ports:
      - "3000:3000"

volumes:
  db_data:
  redis_data:
